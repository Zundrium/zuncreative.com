  - name: Code Couture Editor
    slug: code-couture-editor
    type: 3d
    partner: VideOrbit Studio
    description: With this editor, it's possible to create an unlimited amount of different garments using a procedural shader.
    full_description: <p>With this editor, it's possible to create an unlimited amount of different garments using a procedural shader.</p>
     <p>The sliders on the right allow the user to change many different values such as color, thickness of the pattern and symmetry.</p>
     <p>The editor was used in an exposition at Design Museum Den Bosch.</p>

  - name: Nationale
      Museumweek 2021
    partner: Capitola
    slug: nationale-museumweek-2021
    type: 3d
    description: An online alternative to a national museum event, where over 400 museums show their favourite work to the entire country.
    full_description: <p>Just like 2020, when thanks to COVID social events were cancelled. The client had to find an alternative for making an event that shows artpieces from over 400 museums in The Netherlands.</p>

      <p>This was done with a three dimensional representation of the Museumplein in Amsterdam, where the event would normally be held. </p>
    external_url: https://nmw2021.zuncreative.com
  - name: 3D Expo
    slug: expo
    type: 3d
    description: A technical proof of concept showing a realistically lit threedimensional space using the newest image compression techniques.
    full_description: <p>This demo shows the possibilities of new texture compression techniques, making it possible to reduce the filesize of a complete 3D expo to 9MB (Normally 50MB).</p>
      
      <p>Other solutions have way longer loading times and are not made to be used on mobile phones.</p>
    external_url: https://expo.zuncreative.com
  - name: Nationale
      Museumweek 2020
    partner: Capitola
    slug: nationale-museumweek-2020
    type: 3d
    description: An online alternative to a national museum event, where over 400 museums show their favourite work to the entire country.
    full_description: <p>Thanks to COVID social events were cancelled. The client had to find an online alternative for making an event that shows artpieces from over 400 museums in The Netherlands.</p>

      <p>This was done with a three dimensional representation of the Museumplein in Amsterdam, where the event would normally be held. </p>
    external_url: https://nmw2020.zuncreative.com
  - name: Amazon
      Deforestation 
    slug: amazon-deforestation
    type: 3d
    description: This demo is to show the power of experience. Facts about amazon deforestation come to life once you can actually see what happens.
    full_description: <p>When someone hears about factual oneliners, like <i>"150 billion animals are slaughtered every year", people do not have a reference to comprehend the grand scale of things. </p>

      <p>This can be different when an animation shows you the exact realtime consequences of what is happening in the world.</p>
    external_url: https://demo.zuncreative.com/amazon-deforestation

  - name: History Lesson 
    slug: history-lesson
    type: 3d
    description: Many lessons like these tend to be dry and easily forgotten, but it's completely different when you can explore how they lived.
    full_description: <p>This scene uses realtime lighting which performs just as well on mobile devices. A quick history lesson to show how the romans had dinner back in the day. </p>

      <p>In this way we can let the user feel the atmosphere in the air and see the romans in their natural environment. Things like this are easier to remember and trigger the user into exploring all the objects in the room.</p>
    external_url: https://demo.zuncreative.com/roman-dining

  - name: Car Customization
    slug: car-customization
    type: 3d
    description: An interactive presentation to show how you can present your product in your style.
    full_description: <p>This demo shows how you can even show the insides of your car. Another perspective with respect to size and shape instead of showing flat images.</p>

      <p>This is just a demo, but the idea can be expanded with showcases of how and where you would use your new car.</p>
    external_url: https://demo.zuncreative.com/car-demo

  - name: Poly Landscape
    slug: landscape
    type: 3d
    description: This proof on concept tries a new way of navigating through moving to the side and selecting certain objects. 
    full_description: <p>This proof on concept tries a new way of navigating through moving to the side and selecting certain objects. Instead of navigating through pages, the camera moves to a certain point in 3D space. This gives the web page an adventurous feel.</p>
    external_url: https://about.zuncreative.com

