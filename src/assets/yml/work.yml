  - name: xSpectar 3D Teaser
    slug: xspectar-teaser
    type: 3d
    partner: Reblika
    description: A cinematic journey through different personalities, each made with NFTs that are provided by xSpectar themselves. 
    full_description: <p>xSpectar focuses on the NFT and Web3.0 space. Even having their own crypto currency network with a token called $XSPECTAR which is based on the XRPL network. </p>
      
      <p>A complete 3D artist team worked on making this possible. Each camera shot was delegated to a specific person to make the short deadline possible.</p>

    external_url: https://xspectar-teaser.zuncreative.com
  
